# Configuración de TriageBot.
#
# Aquí vive TODO lo que antes estaba hardcodeado en el código: modelo, prompt,
# parámetros del clasificador, valores de fallback, límites de validación y
# catálogo de categorías/prioridades/estados.
#
# IMPORTANTE: este fichero NO contiene secretos. La API key nunca se escribe
# aquí; sólo se indica el NOMBRE de la variable de entorno de la que leerla
# (classifier.api_key_env). La ruta de este fichero puede sobreescribirse con
# la variable de entorno CONFIG_PATH.

ticket:
  categories: [bug, feature_request, question, urgent]
  priorities: [P1, P2, P3]
  # Ciclo de vida: abierto -> en curso -> resuelto (y se puede reabrir).
  # "closed" se mantiene por compatibilidad y como archivado manual.
  statuses: [open, in_progress, resolved, closed]
  default_status: open
  # Estados terminales: un ticket en estos estados NO cuenta como vencido.
  terminal_statuses: [resolved, closed]
  # Plazo (SLA) en días desde la creación, según prioridad:
  # P1 = hoy mismo, P2 = mañana, P3 = un par de días.
  sla_days:
    P1: 0
    P2: 1
    P3: 2

validation:
  title_max_len: 200
  description_max_len: 5000
  # Gestión de usuarios (registro / login).
  name_max_len: 80
  email_max_len: 254
  password_min_len: 8
  password_max_len: 128

database:
  # Si la variable de entorno indicada existe, tiene prioridad sobre default_url.
  url_env: DATABASE_URL
  default_url: "sqlite:///triagebot.db"

classifier:
  # Nombre de la variable de entorno con la API key (el valor jamás vive aquí).
  api_key_env: OPENROUTER_API_KEY
  model: "openai/gpt-oss-120b"
  base_url: "https://openrouter.ai/api/v1"
  max_tokens: 256

  # Valor por defecto de último recurso si todo lo demás falla.
  fallback:
    category: question
    priority: P3
    tags: []

  system_prompt: |-
    Eres un clasificador de tickets de soporte. Respondes SIEMPRE con un único objeto JSON, sin texto adicional, con esta forma exacta:
    {"category": <"bug"|"feature_request"|"question"|"urgent">, "priority": <"P1"|"P2"|"P3">, "tags": [<strings cortos>]}
    P1 es la prioridad más alta. Devuelve una lista corta de tags útiles (puede estar vacía).
    IMPORTANTE sobre el idioma: TODO el texto libre que generes debe estar en castellano (español). En particular, los "tags" deben estar SIEMPRE en castellano, en minúsculas y sin acentos (por ejemplo: "inicio-sesion", "exportar", "factura"). No uses inglés en los tags. Los valores de "category" y "priority" se mantienen tal cual en los códigos indicados arriba.

  # Heurística por palabras clave usada cuando el LLM no está disponible.
  heuristic:
    max_tags: 3
    default:
      category: question
      priority: P3

    # Reglas evaluadas EN ORDEN; la primera cuyos keywords aparezcan en el texto
    # (normalizado: minúsculas y sin acentos) gana. Esto da la precedencia
    # urgent > bug > feature_request > question.
    rules:
      - category: urgent
        priority: P1
        keywords:
          - "urge"
          - "urgent"
          - "critic"
          - "caido"
          - "caida"
          - "se cae"
          - "no funciona"
          - "no carga"
          - "no puedo trabajar"
          - "no podemos trabajar"
          - "bloquea"
          - "bloqueado"
          - "bloqueante"
          - "parado"
          - "parados"
          - "produccion"
          - "demo"
          - "cuanto antes"
          - "lo antes posible"
          - "inmediat"
          - "perdida de datos"
          - "fuga de datos"
          - "brecha"
          - "todos los usuarios"
      - category: bug
        priority: P2
        keywords:
          - "error"
          - "fallo"
          - "falla"
          - "fallando"
          - "bug"
          - "roto"
          - "rota"
          - "no muestra"
          - "no aparece"
          - "no guarda"
          - "no se guarda"
          - "no deja"
          - "incorrect"
          - "mal calculad"
          - "se cierra"
          - "se congela"
          - "pantalla en blanco"
          - "excepcion"
          - "500"
          - "no responde"
          - "duplicad"
      - category: feature_request
        priority: P3
        keywords:
          - "añadir"
          - "agregar"
          - "permitir"
          - "poder "
          - "poder\n"
          - "me vendria bien"
          - "nos vendria bien"
          - "seria util"
          - "estaria bien"
          - "estaria genial"
          - "podriais"
          - "se podria"
          - "necesitamos poder"
          - "personalizar"
          - "exportar"
          - "filtro por"
          - "filtrar por"
          - "soporte para"
          - "integrar"
          - "integracion"
          - "mejorar"
          - "sugerencia"
          - "propuesta"
      - category: question
        priority: P3
        keywords:
          - "como "
          - "como se"
          - "donde "
          - "cuando "
          - "que politica"
          - "se puede"
          - "puedo "
          - "es posible"
          - "duda"
          - "consulta"
          - "no se si"
          - "necesito saber"
          - "quisiera saber"
          - "?"

    # Tags descriptivos derivados del texto (clave = palabra a buscar en el
    # texto normalizado; valor = tag emitido, SIEMPRE en castellano).
    tag_keywords:
      pdf: pdf
      exportar: exportar
      login: inicio-sesion
      sesion: inicio-sesion
      contrasena: contrasena
      password: contrasena
      permiso: permisos
      acceso: acceso
      filtro: filtros
      movil: movil
      correo: correo
      email: correo
      informe: informes
      factura: facturacion
      pago: pagos
