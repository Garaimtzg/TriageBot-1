<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TriageBot</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
</head>
<body class="bg-slate-50 text-slate-900">
  <main class="mx-auto max-w-6xl p-6">
    <h1 class="text-3xl font-bold">TriageBot</h1>
    <p class="mt-2 text-slate-600">Tablero de incidencias con clasificación automática por IA.</p>

    <!-- Crear ticket -->
    <section class="mt-6 rounded-lg bg-white p-4 shadow-sm ring-1 ring-slate-200">
      <h2 class="text-lg font-semibold">Nuevo ticket</h2>
      <form
        class="mt-3 grid gap-3 sm:grid-cols-[1fr_2fr_auto] sm:items-end"
        hx-post="/ui/tickets"
        hx-target="#tickets-table"
        hx-swap="innerHTML"
        hx-on::after-request="if(event.detail.successful) this.reset()"
      >
        <label class="block">
          <span class="text-sm font-medium">Título</span>
          <input name="title" required maxlength="200"
                 class="mt-1 w-full rounded border border-slate-300 px-2 py-1.5 text-sm"
                 placeholder="La app no carga">
        </label>
        <label class="block">
          <span class="text-sm font-medium">Descripción</span>
          <input name="description" required maxlength="5000"
                 class="mt-1 w-full rounded border border-slate-300 px-2 py-1.5 text-sm"
                 placeholder="Desde esta mañana aparece una pantalla en blanco…">
        </label>
        <button type="submit"
                class="rounded bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700">
          Crear
        </button>
      </form>
    </section>

    <!-- Filtros -->
    <section class="mt-6">
      <form
        class="flex flex-wrap items-end gap-3"
        hx-get="/ui/tickets"
        hx-target="#tickets-table"
        hx-swap="innerHTML"
        hx-trigger="change"
      >
        <label class="block">
          <span class="text-sm font-medium">Categoría</span>
          <select name="category" class="mt-1 rounded border border-slate-300 px-2 py-1.5 text-sm">
            <option value="">Todas</option>
            {% for c in categories %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
          </select>
        </label>
        <label class="block">
          <span class="text-sm font-medium">Prioridad</span>
          <select name="priority" class="mt-1 rounded border border-slate-300 px-2 py-1.5 text-sm">
            <option value="">Todas</option>
            {% for p in priorities %}<option value="{{ p }}">{{ p }}</option>{% endfor %}
          </select>
        </label>
        <label class="block">
          <span class="text-sm font-medium">Estado</span>
          <select name="status" class="mt-1 rounded border border-slate-300 px-2 py-1.5 text-sm">
            <option value="">Todos</option>
            {% for s in statuses %}<option value="{{ s }}">{{ s }}</option>{% endfor %}
          </select>
        </label>
      </form>
    </section>

    <!-- Tabla -->
    <section id="tickets-table" class="mt-4">
      {% include "_tickets_table.html" %}
    </section>
  </main>
</body>
</html>
