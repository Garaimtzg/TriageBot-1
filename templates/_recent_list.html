{% from "_macros.html" import priority_badge, status_badge %}
<ul class="space-y-2">
  {% for ticket in recent %}
  <li class="rounded-lg bg-white p-3 shadow-sm ring-1 ring-navy-100">
    <div class="flex items-center justify-between gap-2">
      <span class="truncate text-sm font-medium text-navy-900">{{ ticket.title }}</span>
      <span class="shrink-0 text-xs text-navy-400">#{{ ticket.id }}</span>
    </div>
    <div class="mt-2 flex items-center gap-1.5">
      {{ priority_badge(ticket.priority) }}
      {{ status_badge(ticket.status) }}
    </div>
  </li>
  {% else %}
  <li class="rounded-lg bg-white p-4 text-center text-sm text-navy-400 ring-1 ring-navy-100">
    Aún no hay tickets.
  </li>
  {% endfor %}
</ul>
